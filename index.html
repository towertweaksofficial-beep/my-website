<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="nav">
    <h2>My Site</h2>

    <div class="links">
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <div class="hero" id="home">
    <h1>Build Something Real</h1>
    <p>A modern website built from code</p>
    <button onclick="sayHello()">Get Started</button>
  </div>

  <div class="section" id="features">
    <h2>Features</h2>
    <p>Fast. Clean. Professional.</p>
  </div>

  <!-- PRICING -->
  <div class="section" id="pricing">
    <h2>Pricing</h2>

    <div class="grid">

      <div class="card">
        <h3>Basic</h3>
        <p>$0</p>
        <p>Simple website</p>
      </div>

      <div class="card highlight">
        <h3>Pro</h3>
        <p>$10</p>
        <p>Full features</p>
      </div>

      <div class="card">
        <h3>Premium</h3>
        <p>$25</p>
        <p>Everything included</p>
      </div>

    </div>
  </div>

  <div class="section" id="contact">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </div>

  <script src="script.js"></script>
</body>
</html>

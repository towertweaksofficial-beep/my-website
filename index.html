<!DOCTYPE html>
<html>
<head>
  <title>My Pro Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="nav">
    <h2>MyBrand</h2>

    <div class="links">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <div class="hero" id="home">
    <h1>Build Something Real</h1>
    <p>A clean modern website made with code</p>
    <button onclick="sayHello()">Get Started</button>
  </div>

  <div class="section" id="about">
    <h2>About</h2>
    <p>This is a fully coded website you can edit and expand.</p>
  </div>

  <div class="section" id="pricing">
    <h2>Pricing</h2>

    <div class="grid">
      <div class="card">
        <h3>Basic</h3>
        <p>$0</p>
      </div>

      <div class="card highlight">
        <h3>Pro</h3>
        <p>$10</p>
      </div>

      <div class="card">
        <h3>Premium</h3>
        <p>$25</p>
      </div>
    </div>
  </div>

  <div class="section" id="contact">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
